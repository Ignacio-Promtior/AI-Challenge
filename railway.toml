[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
# Railway sets PORT automatically — server.py reads it
# Healthcheck hits / once the server is up
healthcheckPath = "/"
# Allow up to 10 minutes for first-time model download + ingestion
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
